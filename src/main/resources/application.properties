# ==========================
# IA
# ==========================
email.summary.ai.enabled=true
email.summary.ai.provider=gemini

# ==========================
# Google Gemini
# ==========================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# ==========================
# Email Summary
# ==========================

# Destinatário do Daily Briefing
email.summary.destination=${EMAIL_SUMMARY_DESTINATION:}

# Quantidade máxima de e-mails novos processados por execução
email.summary.max-emails-per-run=20

# Quantidade de e-mails enviados juntos em uma única requisição ao Gemini
email.summary.batch-size=5

# Quantidade máxima de e-mails antigos usados como contexto
email.summary.context-emails=5

# Janela máxima de dias para busca de contexto
email.summary.context-days=180

# Idioma das respostas geradas pela IA
email.summary.language=pt-BR

# Horário padrão para futuras execuções automáticas
email.summary.schedule=08:00

# ==========================
# Logs
# ==========================
logging.file.name=logs/email-summary.log
logging.level.root=INFO
logging.level.com.samara.emailsummary=INFO

# ==========================
# Configuração Desktop externa
# ==========================
spring.config.import=optional:file:./config/desktop.properties